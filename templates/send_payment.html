<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Send Payment | Squared</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0c10;
            --surface-color: rgba(31, 33, 40, 0.6);
            --surface-hover: rgba(45, 48, 59, 0.8);
            --border-color: rgba(255, 255, 255, 0.08);
            --text-primary: #ffffff;
            --text-secondary: #8b92a5;
            --accent-blue: #00f2fe;
            --accent-blue-dark: #4facfe;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            background-image:
                radial-gradient(circle at 50% 50%, rgba(79, 172, 254, 0.1), transparent 40%);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            overflow-x: hidden;
            transition: background-color 0.8s ease;
        }

        .country-select {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 1rem 1.5rem;
            color: var(--text-primary);
            font-size: 1.1rem;
            font-weight: 500;
            outline: none;
            transition: all 0.3s;
            appearance: none;
            cursor: pointer;
        }

        .country-select:focus {
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 4px rgba(79, 172, 254, 0.1);
        }

        .select-wrapper {
            position: relative;
        }

        .select-wrapper::after {
            content: "▼";
            position: absolute;
            right: 1.5rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            pointer-events: none;
            font-size: 0.8rem;
        }

        option {
            background: #1f2128;
            color: white;
            font-size: 1.1rem;
        }

        .container {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        header {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .back-btn {
            color: var(--text-secondary);
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.05);
            transition: all 0.3s;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
        }

        .title {
            font-size: 1.5rem;
            font-weight: 600;
        }

        .card {
            background: var(--surface-color);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 2.5rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            animation: fadeUp 0.6s ease forwards;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        label {
            color: var(--text-secondary);
            font-size: 0.9rem;
            font-weight: 500;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .currency-symbol {
            position: absolute;
            left: 1rem;
            width: 2.2rem;
            text-align: center;
            color: var(--text-secondary);
            font-size: 1.5rem;
            font-weight: 500;
        }

        input[type="number"] {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 1rem 1rem 1rem 3.5rem;
            color: var(--text-primary);
            font-size: 1.5rem;
            font-weight: 600;
            outline: none;
            transition: all 0.3s;
            font-family: 'Outfit', sans-serif;
        }

        input[type="number"]:focus {
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 4px rgba(79, 172, 254, 0.1);
        }

        /* Hide arrows on number input */
        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        input[type="number"] {
            -moz-appearance: textfield;
            appearance: none;
            -webkit-appearance: none;
        }

        .btn-submit {
            padding: 1.2rem;
            border-radius: 16px;
            font-weight: 600;
            font-size: 1.1rem;
            cursor: pointer;
            border: none;
            background: linear-gradient(135deg, var(--accent-blue-dark), var(--accent-blue));
            color: #000;
            box-shadow: 0 8px 20px rgba(79, 172, 254, 0.2);
            transition: all 0.3s ease;
            margin-top: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-submit:hover {
            box-shadow: 0 12px 25px rgba(79, 172, 254, 0.4);
            transform: translateY(-2px);
        }

        svg {
            width: 20px;
            height: 20px;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <a href="/" class="back-btn">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                </svg>
            </a>
            <h1 class="title">Send Payment</h1>
        </header>

        <form class="card" action="/send_payment" method="POST">
            <div class="form-group">
                <label for="country">Select Recipient Country</label>
                <div class="select-wrapper">
                    <select id="country" name="country" class="country-select">
                        <option value="US" data-symbol="$" data-rate="1.0" data-color="rgba(79, 172, 254, 0.15)">🇺🇸
                            United States</option>
                        <option value="UK" data-symbol="£" data-rate="1.27" data-color="rgba(138, 43, 226, 0.15)">🇬🇧
                            United Kingdom</option>
                        <option value="EU" data-symbol="€" data-rate="1.08" data-color="rgba(0, 102, 255, 0.15)">🇪🇺
                            Europe</option>
                        <option value="IN" data-symbol="₹" data-rate="0.012" data-color="rgba(255, 153, 51, 0.15)">🇮🇳
                            India</option>
                        <option value="JP" data-symbol="¥" data-rate="0.0065" data-color="rgba(255, 0, 85, 0.15)">🇯🇵
                            Japan</option>
                        <option value="AU" data-symbol="A$" data-rate="0.66" data-color="rgba(0, 204, 255, 0.15)">🇦🇺
                            Australia</option>
                        <option value="CA" data-symbol="C$" data-rate="0.73" data-color="rgba(255, 0, 0, 0.15)">🇨🇦
                            Canada</option>
                        <option value="CH" data-symbol="CH" data-rate="1.10" data-color="rgba(204, 0, 0, 0.15)">🇨🇭
                            Switzerland</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label for="amount">Enter Amount to Send</label>
                <div class="input-wrapper">
                    <span class="currency-symbol">$</span>
                    <input type="number" id="amount" name="amount" step="0.01" min="0.01" placeholder="0.00" required
                        autofocus>
                </div>
                <div id="usd-conversion"
                    style="color: var(--text-secondary); margin-top: 0.5rem; font-size: 0.95rem; font-weight: 500;">
                    Equivalent to: $0.00 USD</div>
            </div>

            <button type="submit" class="btn-submit">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
                </svg>
                Send Now
            </button>
        </form>
    </div>

    <script>
        const countrySelect = document.getElementById('country');
        const currencySymbol = document.querySelector('.currency-symbol');
        const amountInput = document.getElementById('amount');
        const usdConversion = document.getElementById('usd-conversion');

        function updateConversion() {
            const selectedOption = countrySelect.options[countrySelect.selectedIndex];
            const rate = parseFloat(selectedOption.dataset.rate);
            const amount = parseFloat(amountInput.value) || 0;
            const usdAmount = (amount * rate).toFixed(2);
            usdConversion.textContent = `Equivalent to: $${usdAmount} USD`;
        }

        countrySelect.addEventListener('change', function () {
            const selectedOption = this.options[this.selectedIndex];

            // Update currency symbol
            currencySymbol.textContent = selectedOption.dataset.symbol;

            // Update background glow color using a soft radial gradient
            document.body.style.backgroundImage = `radial-gradient(circle at 50% 50%, ${selectedOption.dataset.color}, transparent 60%)`;

            updateConversion();
        });

        amountInput.addEventListener('input', updateConversion);
    </script>
</body>

</html>
