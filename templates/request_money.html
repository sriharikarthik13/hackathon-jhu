<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Request Money | Squared</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0c10;
            --surface-color: rgba(31, 33, 40, 0.6);
            --border-color: rgba(255, 255, 255, 0.08);
            --text-primary: #ffffff;
            --text-secondary: #8b92a5;
            --accent-purple: #9d4edd;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at 50% 50%, rgba(157, 78, 221, 0.1), transparent 40%);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }

        .container {
            width: 100%;
            max-width: 450px;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        header {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .back-btn {
            color: var(--text-secondary);
            text-decoration: none;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.05);
            transition: all 0.3s;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
        }

        .card {
            background: var(--surface-color);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 2.5rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            animation: fadeUp 0.4s ease;
        }

        select {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1rem;
            color: var(--text-primary);
            font-size: 1.1rem;
            outline: none;
            font-family: 'Outfit', sans-serif;
            appearance: none;
        }
        
        select option {
            background: #1f2128;
            color: white;
        }

        .btn-submit {
            width: 100%;
            padding: 1.2rem;
            border-radius: 16px;
            font-weight: 600;
            font-size: 1.1rem;
            cursor: pointer;
            border: none;
            background: linear-gradient(135deg, #7b2cbf, var(--accent-purple));
            color: #fff;
            box-shadow: 0 8px 20px rgba(157, 78, 221, 0.3);
            transition: all 0.3s ease;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 25px rgba(157, 78, 221, 0.5);
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <a href="/" class="back-btn">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" width="20" height="20">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                </svg>
            </a>
            <h1>Request Money</h1>
        </header>

        <div class="card">
            <h3 style="font-weight: 500;">Who do you want to remind?</h3>
            <form action="/request_money" method="POST" style="display: flex; flex-direction: column; gap: 1.5rem;">
                {% if debtors and debtors|length > 0 %}
                    <select name="debtor_name" required>
                        <option value="" disabled selected>Select a friend</option>
                        {% for debtor in debtors %}
                            <option value="{{ debtor }}">{{ debtor }}</option>
                        {% endfor %}
                    </select>
                    <button type="submit" class="btn-submit">Continue to Reminder</button>
                {% else %}
                    <p style="color: var(--text-secondary); text-align: center;">No one currently owes you money!</p>
                {% endif %}
            </form>
        </div>
    </div>
</body>
</html>
